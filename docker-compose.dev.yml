# HomeStack — development override.
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
# Bind-mounts source for hot reload on backend and frontend.

services:
  homestack-backend:
    # Podman rootless: container root maps to your host UID — no user: override needed.
    # Docker: add `user: "${UID:-1000}:${GID:-1000}"` here to avoid root-owned files.
    volumes:
      - ./backend:/app:z
      - media_data:/app/media
      - backup_data:/app/backups
    environment:
      DJANGO_DEBUG: "1"

  homestack-frontend:
    volumes:
      - ./frontend:/app:z
      # Keep the container's own node_modules (don't let the bind mount hide it).
      - /app/node_modules
