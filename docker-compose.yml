# HomeStack — base stack (Milestone 1, Phase 1.0).
# THREE services only: postgres, backend, frontend.
# No Redis/Celery yet — deliberately deferred until a feature needs them (D5).

services:
  homestack-postgres:
    image: postgres:16-alpine
    container_name: homestack-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_HOST_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  homestack-backend:
    build: ./backend
    container_name: homestack-backend
    env_file: .env
    volumes:
      - media_data:/app/media
      - backup_data:/app/backups
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      homestack-postgres:
        condition: service_healthy
    restart: unless-stopped

  homestack-frontend:
    build: ./frontend
    container_name: homestack-frontend
    env_file: .env
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    depends_on:
      - homestack-backend
    restart: unless-stopped

volumes:
  postgres_data:
  media_data:
  backup_data:
